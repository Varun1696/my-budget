<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div> <!-- Animated Gradient Background -->
    
    <div class="container">
        <header class="glass-card main-header">
            <h1>Financial Dashboard</h1>
            <div class="balance-container">
                <div class="bal-item">
                    <small>Total Balance</small>
                    <h2 id="total-balance">$0.00</h2>
                </div>
                <div class="bal-grid">
                    <div class="bal-item income">
                        <small>Income</small>
                        <p id="total-income">+$0.00</p>
                    </div>
                    <div class="bal-item expense">
                        <small>Expenses</small>
                        <p id="total-expense">-$0.00</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Visualization Section -->
            <section class="glass-card chart-section">
                <h3>Spending Analysis</h3>
                <div class="canvas-container">
                    <canvas id="spendingChart"></canvas>
                </div>
                <div id="chartLegend" class="legend"></div>
            </section>

            <!-- Input Section -->
            <section class="glass-card form-section">
                <h3>Add Transaction</h3>
                <form id="form">
                    <input type="text" id="description" placeholder="What was it for?" required>
                    <div class="row">
                        <input type="number" id="amount" placeholder="Amount (e.g. -50)" required>
                        <select id="category">
                            <option value="Salary">Income: Salary</option>
                            <option value="Food">Expense: Food</option>
                            <option value="Rent">Expense: Rent</option>
                            <option value="Shopping">Expense: Shopping</option>
                            <option value="Transport">Expense: Transport</option>
                            <option value="Other">Expense: Other</option>
                        </select>
                    </div>
                    <input type="date" id="date" required>
                    <button type="submit" class="btn-add">Record Transaction</button>
                </form>
            </section>

            <!-- Budget Progress -->
            <section class="glass-card budget-section">
                <h3>Monthly Budget</h3>
                <input type="number" id="budget-limit" placeholder="Set Limit">
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <p id="budget-text">0% of your budget used</p>
            </section>

            <!-- History Section -->
            <section class="glass-card history-section">
                <h3>Recent History</h3>
                <ul id="transaction-list" class="list"></ul>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
